<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>server-monitor</title>
<style>
  :root {
    --page: #eceded;
    --shell: #0d100f;
    --card: #151917;
    --border: rgba(255, 255, 255, 0.06);
    --ink: #e9ebea;
    --muted: #8b938f;
    --faint: #565e5a;
    --green: #34d399;
    --dot-off: rgba(255, 255, 255, 0.07);
    --mono: "JetBrains Mono", "Cascadia Code", Consolas, ui-monospace, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--page);
    font-family: var(--mono);
    color: var(--ink);
    padding: 14px;
  }
  .shell {
    background: var(--shell);
    border-radius: 20px;
    padding: 20px 22px;
    height: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
  }

  header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex: 0 0 auto; }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--muted); }
  .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.4; } }
  .refreshed { margin-left: auto; font-size: 11px; color: var(--faint); }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #2b332f, #111413);
    border: 1px solid var(--border);
    display: grid; place-items: center;
    font-size: 11px; color: var(--muted);
  }

  main {
    flex: 1; min-height: 0;
    display: grid; gap: 14px;
    grid-template-columns: minmax(300px, 360px) repeat(3, 1fr);
    grid-template-rows: 1fr 1fr;
  }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 16px 18px;
    display: flex; flex-direction: column;
    min-height: 0; min-width: 0; overflow: hidden;
  }
  .k { font-size: 10px; letter-spacing: 2px; color: var(--faint); margin-bottom: auto; }
  .big { font-size: clamp(22px, 2.4vw, 34px); font-weight: 600; margin-top: 8px; }
  .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .sub .g { color: var(--green); }
  canvas { width: 100%; height: auto; display: block; margin-top: 12px; flex: 0 0 auto; }

  /* ---- cpu card (gauge + history) ---- */
  .cpu-card { grid-row: 1 / 3; justify-content: space-between; }
  .gauge-wrap { position: relative; display: flex; justify-content: center; flex: 1; align-items: center; min-height: 0; }
  .gauge-glow {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 150px 110px at center, rgba(52, 211, 153, 0.18), transparent 65%);
  }
  .gauge-label { position: absolute; top: 54%; left: 0; right: 0; text-align: center; transform: translateY(-50%); }
  .gauge-label .big { font-size: clamp(30px, 3vw, 44px); margin: 4px 0 0; }
  .gauge-label .tiny { font-size: 11px; color: var(--faint); margin-top: 4px; }

  /* ---- disk dot-bar ---- */
  .dotbar { display: flex; gap: 5px; margin-top: 14px; }
  .dotbar span { width: 7px; height: 7px; border-radius: 50%; background: var(--dot-off); flex: 0 1 auto; }
  .dotbar span.on { background: var(--green); box-shadow: 0 0 6px rgba(52, 211, 153, 0.5); }

  /* ---- net / traffic arrows ---- */
  .duo { display: flex; gap: 18px; margin-top: 8px; align-items: baseline; }
  .duo .big { margin-top: 0; font-size: clamp(17px, 1.6vw, 24px); }
  .duo .arrow { color: var(--green); font-size: 14px; margin-right: 4px; }

  /* ---- os lines ---- */
  .lines { margin-top: 10px; font-size: 12.5px; line-height: 1.9; color: var(--muted); overflow: hidden; }
  .lines b { color: var(--ink); font-weight: 600; display: block; font-size: 14px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }

  #tip {
    position: fixed; z-index: 10; pointer-events: none; display: none;
    background: #0a0c0b; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 10px; font-size: 12px; color: var(--ink);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
  }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }

  @media (max-width: 1000px) {
    main { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); }
    .cpu-card { grid-row: 1 / 3; }
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand"><span class="pulse"></span>server-monitor</div>
    <span class="refreshed" id="refreshed"></span>
    <div class="avatar" id="avatar">··</div>
  </header>

  <main>
    <div class="card cpu-card">
      <div class="k">CPU</div>
      <div class="gauge-wrap">
        <div class="gauge-glow"></div>
        <svg id="gauge" width="230" height="200" viewBox="0 0 240 205" role="img" aria-label="CPU load gauge"></svg>
        <div class="gauge-label">
          <div class="big" id="cpu-big">–</div>
          <div class="tiny" id="cpu-tiny"></div>
        </div>
      </div>
      <canvas id="cv-cpu" aria-label="cpu history"></canvas>
    </div>

    <div class="card">
      <div class="k">RAM</div>
      <div class="big" id="ram-big">–</div>
      <div class="sub" id="ram-sub"></div>
      <canvas id="cv-mem" aria-label="ram history"></canvas>
    </div>

    <div class="card">
      <div class="k">DISK</div>
      <div class="big" id="disk-big">–</div>
      <div class="sub" id="disk-sub"></div>
      <div class="dotbar" id="disk-bar"></div>
    </div>

    <div class="card">
      <div class="k">UPTIME</div>
      <div class="big" id="up-big">–</div>
      <div class="sub" id="up-sub"></div>
    </div>

    <div class="card">
      <div class="k">NETWORK SPEED</div>
      <div class="duo">
        <span class="big"><span class="arrow">&#8595;</span><span id="net-down">–</span></span>
        <span class="big"><span class="arrow">&#8593;</span><span id="net-up">–</span></span>
      </div>
      <canvas id="cv-net" aria-label="network speed history"></canvas>
    </div>

    <div class="card">
      <div class="k">TRAFFIC</div>
      <div class="duo">
        <span class="big"><span class="arrow">&#8595;</span><span id="tr-down">–</span></span>
        <span class="big"><span class="arrow">&#8593;</span><span id="tr-up">–</span></span>
      </div>
      <div class="sub">since boot</div>
    </div>

    <div class="card">
      <div class="k">OS</div>
      <div class="lines" id="os-lines"></div>
    </div>
  </main>
  <div class="sr-only" role="status" id="sr"></div>
</div>
<div id="tip"></div>

<script>
  const $ = (id) => document.getElementById(id);
  const GREEN = '#34d399';
  const ROWS = 3, CELL = 12;

  // ---- gauge ticks (270° arc) ----
  const TICKS = 44;
  const gauge = $('gauge');
  for (let i = 0; i < TICKS; i++) {
    const a = ((135 + (i / (TICKS - 1)) * 270) * Math.PI) / 180;
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    const cx = 120, cy = 102, r1 = 78, r2 = 96;
    t.setAttribute('x1', cx + r1 * Math.cos(a));
    t.setAttribute('y1', cy + r1 * Math.sin(a));
    t.setAttribute('x2', cx + r2 * Math.cos(a));
    t.setAttribute('y2', cy + r2 * Math.sin(a));
    t.setAttribute('stroke-width', 5.5);
    t.setAttribute('stroke-linecap', 'round');
    gauge.appendChild(t);
  }

  function drawGauge(pct) {
    const lit = Math.round((pct / 100) * TICKS);
    [...gauge.children].forEach((t, i) => {
      const on = i < lit;
      t.setAttribute('stroke', on ? GREEN : 'rgba(255,255,255,0.1)');
      t.style.filter = on && i === lit - 1 ? `drop-shadow(0 0 6px ${GREEN})` : '';
      t.setAttribute('stroke-opacity', on ? 0.45 + 0.55 * (i / TICKS) : 1);
    });
  }

  // ---- dot-matrix canvases ----
  // values are 0-100; fmt renders the tooltip for a raw history sample
  const TRACKS = {
    cpu: { cols: 56, fmt: (s) => s.cpu + '%' },
    mem: { cols: 40, fmt: (s) => s.mem + '%' },
    net: { cols: 40, fmt: (s) => `${rate(s.rxs)} ↓ · ${rate(s.txs)} ↑` },
  };
  let lastHistory = [];

  for (const [key, t] of Object.entries(TRACKS)) {
    const cv = $('cv-' + key);
    const dpr = window.devicePixelRatio || 1;
    cv.width = t.cols * CELL * dpr;
    cv.height = ROWS * CELL * dpr;
    cv.getContext('2d').scale(dpr, dpr);
    t.cv = cv;
    cv.addEventListener('mousemove', (e) => tooltip(e, key));
    cv.addEventListener('mouseleave', () => ($('tip').style.display = 'none'));
  }

  function drawMatrix(key, values) {
    const { cv, cols } = TRACKS[key];
    const ctx = cv.getContext('2d');
    ctx.clearRect(0, 0, cols * CELL, ROWS * CELL);
    for (let c = 0; c < cols; c++) {
      const v = values[values.length - cols + c];
      const lit = v == null ? 0 : v >= 67 ? 3 : v >= 34 ? 2 : v > 2 ? 1 : 0;
      for (let r = 0; r < ROWS; r++) {
        const on = v != null && r >= ROWS - lit;
        ctx.beginPath();
        ctx.arc(c * CELL + CELL / 2, r * CELL + CELL / 2, 2.8, 0, Math.PI * 2);
        ctx.fillStyle = on ? GREEN : 'rgba(255,255,255,0.07)';
        ctx.globalAlpha = on ? 0.35 + 0.65 * (v / 100) : 1;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
  }

  function tooltip(e, key) {
    const { cv, cols, fmt } = TRACKS[key];
    const rect = cv.getBoundingClientRect();
    const col = Math.floor(((e.clientX - rect.left) / rect.width) * cols);
    const s = lastHistory[lastHistory.length - cols + col];
    const tip = $('tip');
    if (!s) return (tip.style.display = 'none');
    tip.textContent = `${fmt(s)} · ${new Date(s.t).toLocaleTimeString()}`;
    tip.style.display = 'block';
    tip.style.left = e.clientX + 12 + 'px';
    tip.style.top = e.clientY - 34 + 'px';
  }

  // ---- helpers ----
  const GB = 1073741824;
  const fmt = (n) => n.toLocaleString('en-US');
  function bytes(b) {
    if (b >= GB) return (b / GB).toFixed(b >= 100 * GB ? 0 : 1) + ' GB';
    if (b >= 1048576) return Math.round(b / 1048576) + ' MB';
    return Math.max(0, Math.round(b / 1024)) + ' KB';
  }
  const rate = (b) => (b >= 1048576 ? (b / 1048576).toFixed(1) + ' MB/s' : Math.round(b / 1024) + ' KB/s');
  function ago(s) {
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    return d ? `${d}d ${h}h` : h ? `${h}h ${m}m` : `${m}m`;
  }

  // disk dot-bar (22 dots)
  const bar = $('disk-bar');
  for (let i = 0; i < 22; i++) bar.appendChild(document.createElement('span'));

  // ---- poll ----
  async function tick() {
    let s;
    try {
      s = await (await fetch('/api/stats')).json();
    } catch {
      $('refreshed').textContent = 'connection lost — retrying…';
      return;
    }
    const h = s.history;
    lastHistory = h;

    $('refreshed').textContent = 'refreshed ' + new Date().toLocaleTimeString();
    $('avatar').textContent = s.hostname.slice(0, 2).toUpperCase();

    // cpu
    drawGauge(s.cpu);
    $('cpu-big').textContent = s.cpu + '%';
    $('cpu-tiny').textContent = `${s.coreCount} cores`;
    drawMatrix('cpu', h.map((x) => x.cpu));

    // ram
    const memPct = Math.round((1 - s.mem.free / s.mem.total) * 100);
    $('ram-big').textContent = memPct + '%';
    $('ram-sub').innerHTML = `<span class="g">${bytes(s.mem.total - s.mem.free)}</span> / ${bytes(s.mem.total)}`;
    drawMatrix('mem', h.map((x) => x.mem));

    // disk
    if (s.disk.total > 0) {
      const dPct = Math.round((1 - s.disk.free / s.disk.total) * 100);
      $('disk-big').textContent = dPct + '%';
      $('disk-sub').innerHTML = `<span class="g">${bytes(s.disk.total - s.disk.free)}</span> / ${bytes(s.disk.total)}`;
      [...bar.children].forEach((d, i) => d.classList.toggle('on', i < Math.round((dPct / 100) * 22)));
    }

    // uptime
    $('up-big').textContent = ago(s.uptime);
    $('up-sub').textContent = 'booted ' + new Date(Date.now() - s.uptime * 1000).toLocaleString();

    // network speed (matrix auto-scales to the window's max)
    $('net-down').textContent = rate(s.net.rxs);
    $('net-up').textContent = rate(s.net.txs);
    const speeds = h.map((x) => x.rxs + x.txs);
    const maxSpeed = Math.max(1, ...speeds);
    drawMatrix('net', speeds.map((v) => (v / maxSpeed) * 100));

    // traffic
    $('tr-down').textContent = bytes(s.net.rx);
    $('tr-up').textContent = bytes(s.net.tx);

    // os
    $('os-lines').innerHTML = `<b>${s.os}</b>${s.platform} · ${s.coreCount} cores<br>${s.hostname}<br>node ${s.node}`;

    $('sr').textContent = `CPU ${s.cpu}%, RAM ${memPct}%, uptime ${ago(s.uptime)}, down ${rate(s.net.rxs)}`;
  }

  tick();
  setInterval(tick, 2000);
</script>
</body>
</html>
